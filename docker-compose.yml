name: atlasops

services:
  db:
    image: postgres:16-alpine
    container_name: atlasops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-atlasops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atlasops}
      POSTGRES_DB: ${POSTGRES_DB:-atlasops}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atlasops} -d ${POSTGRES_DB:-atlasops}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: atlasops-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-atlasops}:${POSTGRES_PASSWORD:-atlasops}@db:5432/${POSTGRES_DB:-atlasops}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production-please-32chars-min}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      SEED_ON_STARTUP: ${SEED_ON_STARTUP:-true}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    command: >
      sh -c "python -m app.cli init-db &&
             python -m app.cli seed --if-empty &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: atlasops-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  postgres-data:
