# ATLASOPS — Render Blueprint
# Provisions the full stack: managed Postgres + FastAPI backend + Next.js frontend.
# Docs: https://render.com/docs/blueprint-spec
#
# NOTE: dockerfilePath and dockerContext are relative to the REPOSITORY ROOT
# (per the Blueprint spec), so we point them at the backend/ and frontend/
# subdirectories directly. buildFilter scopes rebuilds to each service's folder.
#
# After the first deploy, set the two `sync: false` variables in the Render
# dashboard (see DEPLOYMENT.md):
#   - atlasops-api  -> CORS_ORIGINS        = your frontend URL(s)
#   - atlasops-web  -> NEXT_PUBLIC_API_URL = your backend URL  (then redeploy web)

databases:
  - name: atlasops-db
    databaseName: atlasops
    user: atlasops
    plan: free
    region: oregon

services:
  # ------------------------------------------------------------------ #
  # Backend API — FastAPI (Docker)
  # ------------------------------------------------------------------ #
  - type: web
    name: atlasops-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
    buildFilter:
      paths:
        - backend/**
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: atlasops-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      # Seed the demo dataset + demo login accounts on first boot (only when
      # the database is empty). Set to "false" after first deploy if desired.
      - key: SEED_ON_STARTUP
        value: "true"
      # Comma-separated list of allowed browser origins (your frontend URL).
      # e.g. https://atlasops.online,https://www.atlasops.online
      - key: CORS_ORIGINS
        sync: false
      # Optional: enables OpenAI-backed Copilot. Without it, the built-in
      # deterministic local advisor is used.
      - key: OPENAI_API_KEY
        sync: false

  # ------------------------------------------------------------------ #
  # Frontend — Next.js (Docker, standalone output)
  # ------------------------------------------------------------------ #
  - type: web
    name: atlasops-web
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    region: oregon
    autoDeploy: true
    buildFilter:
      paths:
        - frontend/**
    envVars:
      # IMPORTANT: NEXT_PUBLIC_* is baked in at BUILD time. Set this to the
      # backend's public URL, then trigger a redeploy of this service.
      # e.g. https://api.atlasops.online  (or the atlasops-api .onrender.com URL)
      - key: NEXT_PUBLIC_API_URL
        sync: false
